name: Debug site state

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      APPWRITE_ENDPOINT: https://sfo.cloud.appwrite.io/v1
      APPWRITE_PROJECT_ID: 6a17843500336b1e97d8
      APPWRITE_SITE_ID: splits
    steps:
      - name: Site detail
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" > site.json
          python3 -m json.tool site.json

      - name: List deployments
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}/deployments" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" > deployments.json
          python3 <<'PY'
          import json
          d = json.load(open("deployments.json"))
          ds = sorted(d.get("deployments", []), key=lambda x: x.get("$createdAt",""), reverse=True)
          print("Total:", d.get("total", len(ds)))
          for x in ds[:15]:
              print(f"  id={x['$id']} status={x.get('status')} active={x.get('activate')} buildDuration={x.get('buildDuration')}s createdAt={x.get('$createdAt')}")
          PY

      - name: Build logs of latest ready deployment
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          python3 <<'PY' > latest_ready.txt
          import json
          d = json.load(open("deployments.json"))
          ds = sorted(d.get("deployments", []), key=lambda x: x.get("$createdAt",""), reverse=True)
          for x in ds:
              if x.get("status") == "ready":
                  print(x["$id"]); break
          PY
          latest_ready=$(cat latest_ready.txt)
          echo "Latest ready: $latest_ready"
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}/deployments/${latest_ready}" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" > latest_ready.json
          python3 <<'PY'
          import json
          d = json.load(open("latest_ready.json"))
          print("status:", d.get("status"))
          print("activate:", d.get("activate"))
          print("buildDuration:", d.get("buildDuration"))
          print("buildSize:", d.get("buildSize"))
          print("sourceSize:", d.get("sourceSize"))
          print("--- buildLogs ---")
          print(d.get("buildLogs","(empty)")[-8000:])
          PY

      - name: Site runtime logs
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}/logs" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" > logs.json
          echo "Raw (first 4000 chars):"
          head -c 4000 logs.json
          echo
          echo "---"
          python3 <<'PY' || echo "(JSON parse failed)"
          import json
          d = json.load(open("logs.json"))
          for key in ("logs", "executions", "data"):
              if key in d:
                  for x in d[key][:10]:
                      print(json.dumps(x, indent=2)[:2000]); print("---")
                  break
          PY
