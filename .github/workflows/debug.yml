name: Debug site state

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      APPWRITE_ENDPOINT: https://sfo.cloud.appwrite.io/v1
      APPWRITE_PROJECT_ID: 6a17843500336b1e97d8
      APPWRITE_SITE_ID: splits
    steps:
      - name: Available specifications
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          echo "=== Available specs ==="
          curl -sS "${APPWRITE_ENDPOINT}/sites/specifications" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" | python3 -m json.tool

      - name: Site detail
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          echo "=== Site ==="
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" | python3 -m json.tool

      - name: Site runtime logs (most recent 5)
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          echo "=== Recent runtime logs ==="
          curl -sS "${APPWRITE_ENDPOINT}/sites/${APPWRITE_SITE_ID}/logs?queries[]=limit(5)&queries[]=orderDesc(%22%24createdAt%22)" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" > logs.json
          cat > parse.py <<'PYEOF'
          import json
          d = json.load(open("logs.json"))
          for x in (d.get("logs") or d.get("executions") or []):
              print(f"createdAt={x.get('$createdAt')}")
              print(f"status={x.get('status')} statusCode={x.get('responseStatusCode')} duration={x.get('duration')}")
              print(f"requestPath={x.get('requestPath')}")
              print(f"logs={x.get('logs', '(empty)')[:1500]}")
              print(f"errors={x.get('errors', '(empty)')[:1500]}")
              print("---")
          PYEOF
          python3 parse.py || (echo "Parse failed. Raw:"; head -c 3000 logs.json)
